services:
  # Backend Service (Web Service)
  - type: web
    name: Test-spiel-Edrick-backend
    env: node
    plan: starter
    numInstances: 1
    healthCheckPath: /api/health
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL wird manuell in Render Dashboard hinzugefuegt
    
databases:
  # PostgreSQL Database
  - name: Test-spiel-Edrick-db
    databaseName: game_db
    user: admin
    plan: starter
